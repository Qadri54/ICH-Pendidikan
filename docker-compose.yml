services:

  # ── Nginx (reverse proxy) ──────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app-storage:/var/www/html/storage/app/public
      - app-public:/var/www/html/public
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
      - banksumut_certbot_conf:/etc/letsencrypt-banksumut:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ich-net
      - banksumut_net

  # ── PHP-FPM (Laravel app) ──────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      CACHE_STORE: database
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-custom.ini:ro
      - app-vendor:/var/www/html/vendor
      - app-storage:/var/www/html/storage/app/public
      - app-public:/var/www/html/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - ich-net

  # ── Queue Worker ───────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - ./.env:/var/www/html/.env:ro
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ich-net

  # ── Scheduler (cron) ──────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - ./.env:/var/www/html/.env:ro
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ich-net

  # ── Redis ─────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - ich-net

  # ── MySQL 8 ────────────────────────────────
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE:-ich_pendidikan}"
      MYSQL_USER: "${DB_USERNAME:-ich_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ich-net

  # ── Certbot (SSL) ───────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      - nginx

volumes:
  mysql-data:
  redis-data:
  app-vendor:
  app-storage:
  app-public:
  certbot-etc:
  certbot-var:
  certbot-webroot:
  banksumut_certbot_conf:
    external: true
    name: maturitas_digital_banksumut_certbot_conf

networks:
  ich-net:
    driver: bridge
  banksumut_net:
    external: true
    name: maturitas_digital_banksumut_banksumut_net
