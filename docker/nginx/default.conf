server {
    listen 80;
    # listen 443 ssl;  # Aktifkan setelah SSL terpasang
    server_name alifa-project.web.id www.alifa-project.web.id;

    # SSL certificates (aktifkan setelah certbot selesai)
    # ssl_certificate     /etc/letsencrypt/live/alifa-project.web.id/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/alifa-project.web.id/privkey.pem;

    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Static assets — cache 30 days
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP-FPM upstream
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    # Block dotfiles
    location ~ /\.(?!well-known) {
        deny all;
    }
}
