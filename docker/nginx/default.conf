# ── BankSumut: maturitasdigital.site HTTP (redirect ke HTTPS) ─────────────────
server {
    listen 80;
    server_name maturitasdigital.site www.maturitasdigital.site;

    # Certbot renewal tetap lewat HTTP
    location /.well-known/acme-challenge/ {
        proxy_pass http://banksumut_nginx:80;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://maturitasdigital.site$request_uri;
    }
}

# ── BankSumut: maturitasdigital.site HTTPS ────────────────────────────────────
server {
    listen 443 ssl;
    server_name www.maturitasdigital.site;

    ssl_certificate     /etc/letsencrypt-banksumut/live/maturitasdigital.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt-banksumut/live/maturitasdigital.site/privkey.pem;

    return 301 https://maturitasdigital.site$request_uri;
}

server {
    listen 443 ssl;
    server_name maturitasdigital.site;

    ssl_certificate     /etc/letsencrypt-banksumut/live/maturitasdigital.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt-banksumut/live/maturitasdigital.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:BANKSUMUT:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://banksumut_nginx:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    client_max_body_size 20M;
}

